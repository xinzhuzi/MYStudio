appId: com.manju2026.manying-studio
productName: 漫影工作室
directories:
  buildResources: frontend/assets/brand
  output: release/build
files:
  - from: out
    to: out
    filter:
      - "**/*"
  - package.json
  # Desktop-only packaging guard: exclude web/image-toolchain heavy deps
  - "!node_modules/next/**"
  - "!node_modules/@next/**"
  - "!node_modules/sharp/**"
  - "!node_modules/@img/**"
  # Runtime package hygiene: keep docs/test artifacts out of app.asar without pruning package export entrypoints
  - "!node_modules/**/docs/**"
  - "!node_modules/**/test/**"
  - "!node_modules/**/tests/**"
  - "!node_modules/**/__tests__/**"
  - "!node_modules/**/coverage/**"
  - "!node_modules/**/example/**"
  - "!node_modules/**/examples/**"
  - "!node_modules/**/*.map"
  - "!node_modules/**/*.ts"
  - "!node_modules/**/*.tsx"
  - "!**/.cache/**"
  - "!**/coverage/**"

extraResources:
  - from: backend
    to: backend
    filter:
      - "**/*"
      - "!tests/**"
      - "!**/tests/**"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!README.md"
      - "!**/*.md"
      - "!python/**"
      - "!venv/**"
      - "!**/.DS_Store"
  - from: frontend/assets/studio-manuals
    to: studio-manuals
    filter:
      - "**/*"
      - "!art_skills/daojie_ink_guofeng/**"
      - "!story_skills/Daojie_xianxia/**"
      - "!**/.DS_Store"
      - "!**/__MACOSX/**"
      - "!**/.cache/**"
      - "!**/__pycache__/**"
      - "!**/coverage/**"
      - "!**/node_modules/**"
      - "!**/tests/**"
      - "!**/__tests__/**"
      - "!**/*.pyc"
      - "!**/*.pyo"
      - "!**/*.tmp"
      - "!**/*.bak"
      - "!**/*.map"
      - "!**/*.tsbuildinfo"
      - "!**/*.psd"
      - "!**/*.zip"

asar: true
asarUnpack:
  - "**/*.node"

# 图标配置
icon: frontend/assets/brand/manying-studio-icon.ico

mac:
  icon: frontend/assets/brand/manying-studio-icon.icns
  artifactName: ${name}-${version}-${arch}-mac.${ext}
  target:
    - dmg
    - zip

win:
  executableName: manying-studio
  icon: frontend/assets/brand/manying-studio-icon.ico
  forceCodeSigning: false
  target:
    - target: nsis
      arch:
        - x64

# NSIS 安装包配置
nsis:
  include: config/installer.nsh
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: 漫影工作室
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  createStartMenuShortcut: true
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: frontend/assets/brand/manying-studio-icon.ico
  uninstallerIcon: frontend/assets/brand/manying-studio-icon.ico
  installerHeaderIcon: frontend/assets/brand/manying-studio-icon.ico
