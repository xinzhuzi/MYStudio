<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>漫影工作室</title>
    <style>
      :root {
        color-scheme: dark;
        background: #17191c;
      }

      :root.light {
        color-scheme: light;
        background: #f2efe3;
      }

      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: #17191c;
      }

      :root.light body,
      :root.light #root {
        background: #f2efe3;
      }
    </style>
    <script>
      (() => {
        try {
          const legacyPrefix = "mo" + "yin";
          const raw = localStorage.getItem("mystudio-theme") || localStorage.getItem(`${legacyPrefix}-theme`);
          const state = raw ? JSON.parse(raw).state : null;
          const theme = state?.theme === "light" ? "light" : "dark";
          const preset = state?.colorPreset || (theme === "dark" ? "cinema" : "eyeCare");
          document.documentElement.classList.add(theme, `theme-preset-${preset}`);
        } catch {
          document.documentElement.classList.add("dark", "theme-preset-cinema");
        }
      })();
    </script>
  </head>
  <body style="margin: 0; background: #17191c;">
    <div id="root" style="min-height: 100vh; background: #17191c;"></div>
    <script type="module" src="../main.tsx"></script>
  </body>
</html>
